<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found — Battery Backup Guide</title>
<style>
:root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --text-light: #64748b; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
h1 { font-size: 4rem; color: var(--primary); margin-bottom: 10px; }
h2 { font-size: 1.5rem; margin-bottom: 20px; }
p { color: var(--text-light); margin-bottom: 8px; max-width: 480px; }
a { color: var(--primary); text-decoration: none; font-weight: 500; }
a:hover { text-decoration: underline; }
.btn { display: inline-block; margin-top: 20px; background: #2563eb; color: white; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-weight: 600; }
.btn:hover { background: #1d4ed8; text-decoration: none; }
</style>
</head>
<body>
<h1>404</h1>
<h2>Page not found</h2>
<p>The page you're looking for doesn't exist or has been moved.</p>
<p>Try one of our guides instead:</p>
<a href="/" class="btn">← Back to Home</a>
</body>
</html>
